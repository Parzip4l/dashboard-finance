services:
  backend_erp:
    build:
      context: .
      target: backend-erp-dev
    command: npm run dev:erp:watch
    working_dir: /app
    env_file:
      - backend_erp/.env
    environment:
      NODE_ENV: development
      ERP_BACKEND_PORT: "5100"
      ERP_CORS_ORIGIN: "*"
    ports:
      - "5100:5100"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: frontend-dev
    command: npm run dev -- --host 0.0.0.0
    working_dir: /app
    environment:
      NODE_ENV: development
      VITE_ERP_API_TARGET: http://backend_erp:5100
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      - backend_erp
    restart: unless-stopped

volumes:
  node_modules:
